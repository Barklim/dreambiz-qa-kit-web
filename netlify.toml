# Netlify deploy config.
# - Connect this repo/folder in app.netlify.com → it runs the build and serves dist/.
# - Or run `npm run build` locally and drag the `dist/` folder onto app.netlify.com.
[build]
  command = "npm run build"
  publish = "dist"

# Don't cache the manifest — a new report must show up immediately after deploy.
[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
